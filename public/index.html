<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallWebRTC – Home</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="landing-page">
  <div class="landing-card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
        <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
      <h1>CallWebRTC</h1>
    </div>
    <p class="subtitle">Real-time audio calls &amp; video streaming — no plugins required.</p>

    <form id="join-form" novalidate>
      <div class="form-group">
        <label for="user-name">Your Name</label>
        <input
          id="user-name"
          type="text"
          placeholder="Enter your name"
          maxlength="32"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label for="room-id">Room ID</label>
        <div class="room-input-row">
          <input
            id="room-id"
            type="text"
            placeholder="Enter or generate a room ID"
            maxlength="64"
            autocomplete="off"
            required
          />
          <button type="button" id="gen-room" class="btn btn-secondary" title="Generate random room ID">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="join-error" class="error-msg" role="alert" aria-live="polite"></div>

      <button type="submit" class="btn btn-primary btn-full">
        Join Room
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
      </button>
    </form>

    <p class="hint">Share the same Room ID with the person you want to call.</p>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
