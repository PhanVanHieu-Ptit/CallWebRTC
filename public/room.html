<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallWebRTC – Room</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="room-page">

  <!-- Top bar -->
  <header class="room-header">
    <div class="room-info">
      <span class="room-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
      </span>
      <span id="room-name-display" class="room-label">Loading…</span>
    </div>
    <div class="room-status">
      <span id="connection-badge" class="badge badge--waiting">Waiting</span>
      <span id="peer-count" class="peer-count">0 peer(s)</span>
    </div>
  </header>

  <!-- Video grid -->
  <main class="video-grid" id="video-grid">
    <!-- Local tile -->
    <div class="video-tile" id="local-tile">
      <video id="local-video" autoplay muted playsinline></video>
      <div class="tile-label">
        <span id="local-name">You</span>
        <span class="media-icons" id="local-media-icons">
          <svg class="icon-audio" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="14" height="14" title="Mic on">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
          </svg>
          <svg class="icon-video" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="14" height="14" title="Camera on">
            <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
        </span>
      </div>
      <div class="avatar-fallback" id="local-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
    </div>
    <!-- Remote tiles are added dynamically by room.js -->
  </main>

  <!-- Empty-room overlay -->
  <div id="waiting-overlay" class="waiting-overlay">
    <div class="waiting-content">
      <div class="waiting-spinner"></div>
      <p>Waiting for others to join…</p>
      <p class="waiting-hint">Share the room ID: <strong id="share-room-id"></strong></p>
    </div>
  </div>

  <!-- Controls bar -->
  <footer class="controls-bar">
    <button id="btn-audio" class="ctrl-btn active" title="Toggle microphone" aria-label="Toggle microphone" aria-pressed="true">
      <svg class="icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
      <svg class="icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>
      </svg>
      <span>Mute</span>
    </button>

    <button id="btn-video" class="ctrl-btn active" title="Toggle camera" aria-label="Toggle camera" aria-pressed="true">
      <svg class="icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/>
      </svg>
      <svg class="icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M21 6.5l-4-4-10 10-2-2-1.5 1.5 3.5 3.5 11.5-11.5L21 6.5zM3.27 2L2 3.27 5.63 6.9A5.995 5.995 0 0 0 5 9H3c0-1.1-.9-2-2-2V5c0-1.1.9-2 2-2V2.27zM20 7c0-1.1-.9-2-2-2h-1.73l7.46 7.46L20 7zM4 19h16v2H4z"/>
      </svg>
      <span>Video</span>
    </button>

    <button id="btn-screen" class="ctrl-btn" title="Share screen" aria-label="Share screen" aria-pressed="false">
      <svg class="icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zm-8-3L8 11h3V3h2v8h3l-4 4z"/>
      </svg>
      <svg class="icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M21.79 18L20 16.21V6H6.21L4.62 4.41 3.21 5.82 4 6.62V18H0v2h17.17l1.62 1.62 1.41-1.41L21.79 18zM6 16V8.83l7.17 7.17H6zm14-10H8.83l-2-2H20c1.1 0 2 .9 2 2v10.17l-2-2V6z"/>
      </svg>
      <span>Screen</span>
    </button>

    <button id="btn-hangup" class="ctrl-btn ctrl-btn--danger" title="End call" aria-label="End call">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
      </svg>
      <span>End</span>
    </button>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
